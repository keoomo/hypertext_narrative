<!DOCTYPE html>
<html>
<head>
<style>
@font-face {
  font-family: "Momo Signature";
  src: url("fonts/MomoSignature.ttf") format("truetype");
}

.momo{
  font-family: "Momo Signature", cursive;
}

body{
  	min-height: 100vh;
	margin: 0;
	font-family: "Momo Signature", serif;
	background: linear-gradient(to bottom, #FABDA0, #a68a12);

}

.top-right{
  position: absolute;
  top: 10px;
  right: 10px;
  color: #d16700;
  font-size: 70px;
  font-weight: bold;
  padding: 10px;
}

.top-left{
  position: fixed;
  top: 20px;
  left: 20px;
  padding: 10px;
  z-index: 20;
}

.bottom-right{
  position: fixed;
  bottom: 20px;
  right: 20px;
  padding: 10px;
  z-index: 10;
}

</style>
</head>

<!------------------->
<body>

<div class="top-right">Sweet Dreams</div>
<div class="top-left">
	<a href="index.html">
		<img src="images/BirdFlying.gif">
	</a>
</div>

<div class="bottom-right">
	<a href="index.html">
		<img src="images/BirdFlying.gif">
	</a>
</div>
